  bottle-messages:
    bottle: bottle
    flavor: Message in a Bottle
    content: |
      <p><em>Glass bottle off the {side} bow!</em></p>
      <p><strong>Recovery:</strong> Spend 10 minutes to recover the bottle from
        the sea.</p>
      <p><em>{description} The cork is swollen shut.</em></p>
      <p><strong>Uncork It:</strong> Strength DR 14, or you can always just
        break it open.</p>
      {additional}
      {contents}
    description:
      base: |
        You have recovered an onion-shaped {bottle} of dark olive glass from
        the sea. There seems to be some paper rolled up inside of it.
      with: |
        You have recovered an onion-shaped {bottle} of dark olive glass from
        the sea. There seems to be some paper rolled up inside of it, as well
        as {hint}.
      described: |
        You have recovered an onion-shaped {bottle} of dark olive glass
        {description} from the sea. There seems to be some paper rolled up
        inside of it.
      describedWith: |
        You have recovered an onion-shaped {bottle} of dark olive glass
        {description} from the sea. There seems to be some paper rolled up
        inside of it, as well as {hint}.
    recovered:
      base: |
        <p>You found this note inside a bottle that you plucked from the sea on
        {date}.</p>
      with: |
        <p>You found this note inside a bottle that you plucked from the sea on
        {date}, along with {contents}.</p>
      described: |
        <p>You found this note inside a bottle {description} that you plucked
        from the sea on {date}.</p>
      described-with: |
        <p>You found this note inside a bottle {description} that you plucked
        from the sea on {date}, along with {contents}.</p>
  intelligence:
    encrypted:
      name: Encrypted Message
      link: Decrypted Message
      description: |
        <p><strong>Encrypted:</strong> Test Presence DR 14 to decrypt this
        encoded message <em>if you can read the language it’s written
        in</em>.</p>
    decrypted: |
      <p><strong>Decrypted:</strong> This message was written in a cipher,
        but you decoded it.</p>
    fort-upgrades:
      title: Report on Upgrades to {fort}
      evidence:
        verified: |
          I have personally verified
        observation: |
          I have carefully watched the comings and goings at the fort for
          several weeks now, and have seen enough to confidently report
        money: |
          I have observed ledgers and followed up with local merchants and
          other purveyors, enough to deduce
        heard: |
          I have heard persist rumors
      upgrade:
        tunnels: |
          <p><strong>Language:</strong> The report is written in {lang}.</p>
          <hr />
          <p><em>Your Excellency,</em></p>
          <p><em>{evidence} that secret tunnels are being built beneath
            {fort}.</em></p>
          <p><em>Ever your faithful servant,<br />Agent {agent}</em></p>
        expansion: |
          <p><strong>Language:</strong> The report is written in {lang}.</p>
          <p><strong>Mechanics:</strong> If true, the fort will have +50 HP and
            one additional die in its broadsides attack.</p>
          <hr />
          <p><em>Your Excellency,</em></p>
          <p><em>{evidence} that a new battery is being added to
            {fort}.</em></p>
          <p><em>Ever your faithful servant,<br />Agent {agent}</em></p>
        armor: |
          <p><strong>Language:</strong> The report is written in {lang}.</p>
          <p><strong>Mechanics:</strong> If true, the fort has tier
            1 armor.</p>
          <hr />
          <p><em>Your Excellency,</em></p>
          <p><em>{evidence} that the walls of {fort} are being rebuilt with
            coral stone. As your excellency well knows, such stone compresses
            under cannon fire rather than shattering.</em></p>
          <p><em>Ever your faithful servant,<br />Agent {agent}</em></p>
        undead: |
          <p><strong>Language:</strong> The report is written in {lang}.</p>
          <hr />
          <p><em>Your Excellency,</em></p>
          <p><em>{evidence} that several chambers have been dug beneath
            {fort}, and these chambers have been stocked with {skeletons}. If
            the garrison believes that all is lost, a lever can be pulled to
            release these skeletons, ensuring that if they cannot maintain
            control of the fort then only the dead will.</em></p>
          <p><em>Ever your faithful servant,<br />Agent {agent}</em></p>
        skeletons: skeletons
    convoys:
      goods:
        ash: ash
        sugar: sugar
      title: Convoy Schedule
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        <p><strong>Convoy Schedule:</strong> This is the schedule for a convoy
          of {size} {colors} merchant frigates loaded with {good}. They will
          depart {origin} for {dest} on {day}, with {escort} naval vessels
          in escort.</p>
        <p><strong>Ships:</strong></p>
        <ul class="link-list">{ships}</ul>
        <p><strong>Escort:</strong></p>
        <ul class="link-list">{escortShips}</ul>
    corruption:
      title: Allegations of Corruption Against the {governor}
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        <p><strong>Allegations:</strong> {crime}</p>
      evidence:
        solid: all of the documents needed to prove
        testimony: testimony from several key witnesses alleging
        hearsay: a collection of rumors suggesting
      crimes:
        skimming: |
          The report provides {evidence} that the {governor} is underreporting
          customs collected and keeping the difference for himself.
        selling-offices: |
          The report provides {evidence} that the {governor} is auctioning off
          positions like harbor master, customs inspector, and town magistrate
          to the highest bidder.
        embezzlement: |
          Soldiers die all the time in the Caribbean — from disease, from the
          Scourge, sometimes even in battle. When that happens, not all
          governors report the loss as they ought. The dead soldier continues
          to be paid his wage, but it all goes directly into the governor’s
          personal coffers. This report provides {evidence} that the {governor}
          is engaged in just such a scheme, with at least [[d100]] dead soldiers
          still listed in the rolls.
        ash: |
          Defending settlements from the Scourge is dangerous, but it can also
          be a lucrative source of ash from all of the undead that are
          destroyed in the process each night. The governor is
          <em>supposed</em> to send that back to the Old World in regular
          shipments — but instead, this report provides {evidence} that the
          {governor} has employed a network of his own sellers to distribute
          it on the local black market.
        arms: |
          The report provides {evidence} that the {governor} is selling
          munitions, gunpowder, and even cannons supplied for the defense of
          the colony to anyone willing to buy and keeping the profits for
          himself.
        privateers: |
          The report provides {evidence} that the {governor} is issuing letters
          of marque to pirates who offer him a sufficient cut of their profits.
        pardons: |
          The report provides {evidence} that the {governor} is selling pardons
          to pirates and other criminals who offer sufficient bribes.
        probate: |
          The report provides {evidence} that the {governor} is manipulating
          the probate courts to seize the estates of deceased merchants.
        illegal-trade: |
          The report provides {evidence} that the {governor} is engaging in
          illegal trade with the {rival}.
        extortion-scourge: |
          The report provides {evidence} that the {governor} is refusing to
          protect settlements from the Scourge unless they pay him exorbitant
          bribes.
        extortion-pirates: |
          The report provides {evidence} that the {governor} is refusing to
          protect settlements from pirates unless they pay him exorbitant
          bribes.
        harboring: |
          The report provides {evidence} that the {governor} is harboring
          necromancers, sorcerers, and others who can control the undead. In
          exchange for his protection, they not only protect him and his
          properties from the Scourge, but even direct them towards his
          enemies, rivals, and anyone else who challenges him.
        imprisonment: |
          The report provides {evidence} that the {governor} is jailing wealthy
          citizens on trumped-up charges until they can pay his exorbitant
          “fines.”
    outbreak:
      title: "{disease} in {settlement}"
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        <p><strong>Outbreak:</strong> {situation}</p>
        <p><strong>Reaction:</strong> {reaction}</p>
      diseases:
        dysentery:
          title: The Bloody Flux
          sentence: the bloody flux
        smallpox:
          title: The Pox
          sentence: the pox
        measles:
          title: Measles
          sentence: measles
        diphtheria:
          title: Boulogne Sore Throat
          sentence: Boulogne sore throat
      fumigants:
        sulphur: brimstone
        gunpowder: gunpowder
        tar: tar
        tobacco: tobacco
        ash: ash
        mix:
          volatile:
            two: a volatile mix of {fumigant1} and {fumigant2}
            three: a volatile mix of {fumigant1}, {fumigant2}, and {fumigant3}
          regular:
            two: a mixture of {fumigant1} and {fumigant2}
            three: a mixture of {fumigant1}, {fumigant2} and {fumigant3}
      reactions:
        ignore: |
          The authorities ignored the problem, hoping that it would resolve
          itself.
        prayer: |
          Religious authorities responded by calling for prayer and fasting.
        fumigation: |
          The townspeople have responded with extensive fumigation, burning
          {fumigants}, splashing vinegar on every surface they can find, and
          distributing smelling bottles filled with camphor and aromatic herbs.
        quarantine: |
          Civil authorities responded by marking the houses of the afflicted
          and forbidding them from leaving their homes unless and until they
          could be verified as healthy by a physician.
        closure: |
          The authorities responded by shutting down the local markets.
      situations:
        early: |
          The report describes the early days of an outbreak of {disease} in
          {settlement} in {month} {year}. Several individuals had contracted
          the disease, with fear spreading that whatever miasma had fallen upon
          them would soon take the entire settlement.
        mid: |
          The report describes an outbreak of {disease} in {settlement} in
          {month} {year}. At the time of writing, the disease was running
          rampant throughout the settlement, claiming new victims with each
          passing day.
        late: |
          The report describes an outbreak of {disease} in {settlement} in
          {month} {year}. The miasma had fallen on the settlement weeks
          earlier, burning through the population. At this point, the people
          hope that it may soon lift, and they can begin rebuilding.
    spies:
      title: Spies of the {spymaster}
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        <p><strong>Spy List:</strong> The report lists spies, informants, and
          other intelligence assets that the agents of the {spymaster} have
          cultivated across the West Indies.</p>
        <ul>
          {list}
        </ul>
      listing: |
        {name}, {position}, {motivation}.
      candidates:
        secretary: a secretary to one of the {governor}’s senior officials
        pilot: a harbor pilot at {port}
        port-master: a master of the port of {port}
        official: an official at the port of {port}
        physician:
          personal: personal physician to the {governor}
          regimental: regimental physician at {fort}
        merchant: a merchant in {port}
        customs: a customs official in {port}
        army: a lieutenant at {fort}
        navy: a lieutenant of the {navy}
        servant: a servant in the household of the {governor}
        interpreter: an interpreter for the {governor}
        tavern: a tavern keeper in {port}
      motivation:
        reward:
          money: |
            paid for {pa} services. If necessary, {pa} past collaboration
            could be leveraged as blackmail against {o}, but use this option
            judiciously
          pardon: |
            offered a pardon. To cultivate, heighten {pa} fear of punishment.
            As a last resort, we could threaten to reveal evidence of {pa}
            crimes to the authorities
          promise:
            fulfilled: |
              provided aid in a personal endeavor. Gratitude won’t last
              forever, though. If {s} proves unwilling to continue, we can
              switch to blackmail with {pa} past cooperation as evidence, or
              harm to {pa} family
            unfulfilled: |
              promised aid in a personal endeavor. We can’t put off fulfillment
              indefinitely, but we’ll get what we need from {o} first
        ideology:
          spanish:
            british:
              protestant: |
                eager to help {his} fellow Protestants against the Catholic
                Monarchy
              trade: |
                opposed to the Spanish <em>flota</em> system and royal
                monopolies
              intellectual: |
                opposed to the Inquisition and its stifling of intellectual
                pursuits
            french:
              catholic: |
                motivated by an opposition to ultramontanism and a desire to
                see episcopal independence as we have in France extend to the
                Iberian peninsula
              francophile: |
                motivated by a belief in the superiority of French culture
              corruption: |
                motivated by opposition to the corruption of the Spanish
                colonial system
            dutch:
              trade: |
                a disciple of Grotius who opposes Spanish mercantilism
              religious: |
                motivated by sympathies for the religious minorities
                persecuted by the Inquisition, particularly contrasted against
                the religious tolerance of the Dutch Republic
              intellectual: |
                motivated by an opposition to Spanish scholasticism and the way
                it stifles the flourishing of natural philosophy and sciences
          british:
            spanish:
              catholic: |
                motivated by loyalty to {pa} fellow Catholics
              jacobite: |
                a loyal Jacobite
              illegal: |
                a student of Francisco Suárez, Francisco de Vitoria, and their
                concepts of natural law; {he} believes that the British conquest
                of the West Indies was a violation of that law
            french:
              jacobite: |
                a loyal Jacobite
              francophile: |
                motivated by a belief in the superiority of French culture
              leveller: |
                motivated not by any love for France but commitment to the old
                radical causes of the English Civil War, which {s} feels the
                Restoration and even the new Hanoverian regime have betrayed
            dutch:
              trade: |
                a disciple of Grotius opposed to British mercantilism
              religious: |
                motivated by a desire to bring Dutch religious tolerance to
                the British Empire
              aristocrat: |
                motivated by a belief that society should be ruled by commerce
                and citizenship rather than ancient bloodlines
          french:
            spanish:
              catholic: |
                motivated by a belief that Gallicanism is heretical
              unionist: |
                motivated by a belief that Philip V is the rightful king of
                France as well as Spain
              bull: |
                motivated by a belief that France’s presence in the New World
                violates the 1493 Bulls of Donation
            british:
              lockean: |
                a disciple of Locke opposed to France’s absolute monarchy
              tolerance: |
                a student of Bayle’s, convinced to provide intelligence against
                France by cultivating {pa} animosity to the kingdom’s religious
                intolerance
              intellectual: |
                motivated by an antipathy for French censorship and an
                admiration for the free circulation of ideas in England
            dutch:
              republican: |
                motivated by an opposition to France’s absolute monarchy and a
                preference for republicanism as practiced in the Netherlands
              tolerance: |
                motivated by sympathies for the religious minorities
                persecuted by the Kingdom of France, particularly contrasted
                against the religious tolerance found in the Dutch Republic
              trade: |
                a disciple of Grotius opposed to French mercantilism
          dutch:
            spanish:
              usurper: |
                motivated by a belief that the Eighty Years’ War was an
                illegitimate usurpation and Spain should rule the Netherlands
                once again
              morality: |
                motivated by a belief that the tolerance of the Dutch Republic
                has led to moral decay
              commerce: |
                motivated by a belief that the Dutch Republic’s commitment to
                free trade undermines the proper moral order of commerce as
                subservient to the common good
            british:
              corruption: |
                motivated by a belief that Britain’s constitutional monarchy is
                superior to the corrupt Dutch oligarchy
              recompense: |
                motivated by a belief that the Netherlands’ trading with
                enemies during wartime was a betrayal. We have cultivated
                {o} with a belief that providing intelligence is one way
                in which {s} can personally help right that wrong
              religion: |
                motivated by a belief that Dutch Reformed theology has erred
                and the moderate Calvinism of the Church of England is correct
            french:
              francophile: |
                motivated by a belief in the superiority of French culture
              monarchist: |
                motivated by a belief that the Dutch Republic’s factional
                disorder proves the need for an absolute monarch
              catholic: |
                motivated by connections to the Catholic Flemish and Walloon
                populations in the Dutch Republic and the belief that they are
                owed protection by the King of France as fellow Catholics and
                speakers of the <em>langues d'oïl</em>
        coercion:
          homosexual: |
            blackmailed with evidence of {pa} homosexual activities
          affair: |
            blackmailed with evidence of {pa} affair
          illegitimate:
            son: |
              blackmailed with evidence of {pa} illegitimate son
            daughter: |
              blackmailed with evidence of {pa} illegitimate daughter
          threatened:
            son: |
              coerced with threats against {pa} son
            daughter: |
              coerced with threats against {pa} daughter
            mother: |
              coerced with threats against {pa} mother
            father: |
              coerced with threats against {pa} father
        ego:
          grievance: |
            motivated by personal grievance. Cultivate by returning to the
            unfairness of the injury done to {o} and how you can set it
            right
          thrill: |
            motivated by the thrill of involvement in clandestine activities.
            Cultivate with exaggerated tales of skullduggery. Make {o} feel
            like {s} is part of something elaborate and exciting
          vanity: |
            motivated by the vanity of possessing secrets others desire.
            Cultivate with flattery and the reassurance that {s} is a
            person that powerful men quietly depend upon
          validation: |
            motivated by feelings of validation. Cultivate with reassurances
            of {his} value and importance, that even if {pa} superiors fail to
            recognize {pa} worth, <em>you</em> see it
    pirate:
      title: Captain {name}, {month} {year}
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        <p><strong>Report:</strong> The report was written in {month} {year},
          detailing the latest activities of Captain {link} and crew as of
          that time. {detail}</p>
      fallback:
        name: '“Black Bart” Roberts'
        link: '@UUID[JournalEntry.kBmToOlFZcvft2vP]'
      details:
        infiltrated: |
          It is detailed and specific, suggesting that the agents must have a
          source on the ship providing them with information.
        hostile: |
          It seems to compile all of the information that a pirate hunter would
          need, suggesting that the {empire} will be commissioning (or already
          has commissioned) privateers to hunt them down.
        unsurprising: |
          It doesn’t reveal anything you didn’t already know.
        secret: |
          It reveals one of {name}’s secrets.
        commercial: |
          It focuses on the captain and crew’s ambitions and desires, like a
          business report, suggesting that {empire} plans to approach (or has
          already approached) the captain with a business proposal, bribe, or
          arrangement for mutual profit.
        bad: |
          The information in it is so inaccurate and/or out of date that it
          leads you to believe that {empire} has no idea what this crew is up
          to — or that its intelligence on this matter has even been actively
          compromised.
    ash-kingpin:
      title:
        new: New Ash Kingpin of {location}
        vacuum: Ash Kingpin of {location} Deposed
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        <p><strong>Dated:</strong> The report is dated {day}.</p>
        <p><strong>Ash Kingpin:</strong> {details}</p>
      details:
        consolidated: |
          One {name} has, through intimidation, violence, and scheming,
          cornered the black market trade in ash in {location}.
        killed:
          coup: |
            The ash kingpin of {location}, {former}, has been killed in a coup
            orchestrated by {pa} rival, {name}.
          succeeded: |
            The ash kingpin of {location}, {former}, has been killed. {PA}
            appointed successor, {name}, has stepped into {pa} role, but there
            could be a moment of vulnerability here for a rival to strike.
          vacuum: |
            The ash kingpin of {location}, {former}, has been killed, leaving a
            power vacuum in the local underworld. Will a new kingpin emerge, or
            will this eventually settle into a network of smaller, less
            ambitious dealers?
        captured:
          succeeded: |
            The ash kingpin of {location}, {former}, has been taken into
            custody by the governor’s men, given a speedy trial, and hanged.
            {PA} appointed successor, {name}, has stepped into {pa} role, but
            there could be a moment of vulnerability here for a rival to
            strike, or for the governor to press harder.
          vacuum: |
            The ash kingpin of {location}, {former}, has been taken into
            custody by the governor’s men, given a speedy trial, and hanged.
            With no clear successor or rival in a position to claim {pa}
            position, there is a power vacuum in the local underworld. Will a
            new kingpin emerge, or will this eventually settle into a network
            of smaller, less ambitious dealers?
    uprising:
      title: Slave Uprising in {island}
      report: |
        <p><strong>Language:</strong> The report is written in {lang}.</p>
        {situation}
        {twist}
        {response}
      situations:
        sea: |
          <p><strong>Slave Ship Uprising:</strong> On {uprising}, the slaves
            being transported across the Atlantic by the {ship} escaped the
            hold and took control of the ship. They forced its crew to take
            them to {island} (the nearest point of landfall at the time),
            arriving on {day}, whereupon they disembarked and ran into the
            wilderness.</p>
        transfer: |
          <p><strong>Port Uprising:</strong> On {day}, the {ship} was pulling
            into the main port on {island} with a hold full of human cargo. As
            they would soon discover, though, their prisoners had spent the
            long weeks of that awful voyage preparing for this moment. They
            seized the opportunity provided by the transition to rise up and
            fight their way off the boat, through the port and the town,
            killing anyone who stood in their way until they reached the safety
            of the wilderness beyond.</p>
        plantation: |
          <p><strong>Plantation Uprising:</strong> On {day}, the slaves on one
            of the sugar plantations in {island} rose up, killed the owners and
            overseers, burned the plantation, and disappeared into the
            surrounding wilderness.</p>
        maroons: |
          <p><strong>Maroon Raid:</strong> On {day}, a nearby maroon community
            raided one of the sugar plantations on {island}, killing the owners
            and overseers, razing the plantation, and liberating those held
            in bondage there. The report notes evidence that the slaves knew
            the raid was coming and were prepared to assist it.</p>
        rebellion: |
          <p><strong>Slave Rebellion:</strong> On {day}, slaves held by sugar
            plantations across {island} rose up all at once, killing the owners
            and overseers and razing the plantations. While the women and
            children seem to have been secreted off to some secure location,
            those prepared to fight have come together to form a large,
            well-armed force on the island.</p>
      twists:
        cult: |
          <p><strong>Wretched Cult:</strong> In their desperation, the slaves
            turned to the teachings of the Sunken One and the cult of the
            Wretched. {fishfolk} emerged from the sea to to aid their
            uprising.</p>
        fishfolk: Piscine creatures
        necrosmith: |
          <p><strong>Necrosmith:</strong> One of the slaves was a necrosmith
            employed by a particularly cruel and violent slaver. {S}
            carefully collected the bones of {pa} fellows who were so
            callously slaughtered and, in secret, assembled them into a
            terrible {marrowCannon} driven solely by its desperate need for
            vengeance against the monstrous slaver whose cruelty was woven into
            its creation.</p>
        marrowCannon: marrow cannon
        forger: |
          <p><strong>Forger:</strong> One of the slaves secretly taught {self}
            how to read and write. Besides radicalizing {pa} fellow slaves with
            what {o} read, {o} also used {pa} skills to forge papers to help
            plan and facilitate the uprising, including correspondence with a
            network of far-flung supporters, sympathizers, and collaborators.</p>
        priest: |
          <p><strong>Priest:</strong> The uprising was led by a priest of a
            West African religion, promising that their gods and ancestors
            would assist them.</p>
        priestess: |
          <p><strong>Priestess:</strong> The uprising was led by a priestess of
            a West African religion, promising that their gods and ancestors
            would assist them.</p>
        warlord: |
          <p><strong>Warlord:</strong> The uprising was led by a man who had
            been a celebrated and respected military commander in his homeland.
            He is a brilliant tactician who has clearly brought a degree of
            military sophistication to the uprising that few European generals
            could match.</p>
        prince: |
          <p><strong>Prince:</strong> The uprising was led by a man descended
            from a prestigious royal line from West Africa. He is a charismatic
            leader whose lineage commands respect among the slaves. The story
            of how he ended up in bondage has only helped to spread his
            legend.</p>
        princess: |
          <p><strong>Princess:</strong> The uprising was led by a woman
            descended from a prestigious royal line from West Africa. She is a
            charismatic leader whose lineage commands respect among the slaves.
            The story of how she ended up in bondage has only helped to spread
            her legend.</p>
      responses:
        patrols: |
          <p><strong>Increased Patrols:</strong> The governor has responded by
            ordering the militia and the island’s garrison to increase patrols
            around all sugar plantations and near known maroon settlements.</p>
        lockdown: |
          <p><strong>Lockdown:</strong> The governor has responded by ordering
            a strict lockdown across all of the island’s plantations. Slaves
            are to be confined when not at work, overseers are to be armed on
            watch, and any movement of enslaved persons between plantations is
            strictly forbidden.</p>
        bounties: |
          <p><strong>Bounties:</strong> The governor is offering a bounty of
            20s for the return of any of the escaped slaves, or 100s for one
            of the ringleaders.</p>
        threshold: |
          <p><strong>Military Response:</strong> This is the latest of several
            similar events over the past year in {island}. In response, the
            governor has raised the island’s militia and ordered {x} troops
            from the garrison to hunt down the fugitives.</p>
        emergency: |
          <p><strong>Military Response:</strong> In response, the governor has
            raised the island’s militia and ordered {x} troops from the
            garrison to hunt down the fugitives.</p>
  bottle-sermons:
    god:
      simple:
        title: On the Simple Life
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a steady and
            practiced hand. It is a Puritan sermon condemning luxury and
            extolling the virtues of a simple, ascetic life.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Do not store up for yourselves treasures on earth,
            where moths and vermin destroy, and where thieves break in and
            steal, but store up for yourselves treasures in heaven. Spanish
            plate, fine silks, tobacco, and strong drink may offer comfort to
            the flesh in this life, but it is frugality and simple living which
            is the path to the Lord and the eternal comforts that await us in
            paradise.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with a steady and practiced
            hand.</p>
      rum:
        title: Devil's Sacrament
        note: |
          <p>This note was rolled up inside an old rum bottle that you plucked
            from the sea on {date}. It is written in English with a precise and
            disciplined hand. It is a Quaker sermon condemning the consumption
            of rum.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Where beer is wholesome to the body and Christ Himself
            turned water into wine at Cana, rum is an entirely different
            spirit. While some of my brothers and sisters may say that it may
            be enjoyed in moderation like any other spirit, what purpose can
            there be to such strong drink but the sin of drunkenness? For rum
            is a spirit, aye, but an unclean spirit, a spirit of darkness and
            wantonness, which comes from its father, who is the Devil! As
            Christ turned the wine into His blood at the Last Supper, so does
            the drunk partake in the Devil’s Sacrament when he drinks
            rum!</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with a precise and
            disciplined hand.</p>
      enemy:
        title: Enemy of All Mankind
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a smooth and
            steady hand. It is a Calvinist sermon condemning pirates and
            piracy.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Consider then, brothers, what the righteous doctrine
            of Unconditional Grace means for the case of the wretched pirates
            who prowl our seas. Our laws deem them <em>hostis humani
            generis</em>, the enemy of all mankind, but is the enemy of all
            mankind not the Devil? Yes, but see how regularly these blasphemous
            corsairs will invoke “Old Roger,” “Old Nick,” or any of the other
            titles they bestow upon the Father of Lies, for in truth they are
            his sworn and devoted followers and, like him, enemies of all
            mankind. Nor was there any other path that they might have tread,
            for God knows all things and weighs all things and judges all of us
            righteously for the path He has laid out before us. Before the
            first day of Creation, the Lord knows us all. He knew these beasts
            in all their wretchedness and all the sins they would commit, and
            that they would set their course invariably to the gates of
            Hell.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with a smooth and steady
            hand.</p>
      babylon:
        title: Whore of Babylon
        note: |
          <p>This note was rolled up inside an old bottle that you plucked
            from the sea on {date}. It is written in Dutch with a cramped and
            aggressive hand. It is a sermon arguing that the Scourge is God's
            punishment for Christians' failure to destroy the Roman Catholic
            Church.</p>
          <h3>Excerpt</h3>
          <blockquote><p>“And here is the mind which hath wisdom. The seven
            heads are seven mountains, on which the woman sitteth” — can there
            be any doubt that scripture points us here to the famed seven hills
            of Rome? And who sits there but the pope, “full of names of
            blasphemy”? Can there be any confusion, then, when those nations to
            whom God has entrusted the defense of his True Church make peace
            with Catholic Spain, and Hell itself is rent open and the dead
            begin to rise from the depths of the Caribbean, which Spain lays
            claim to? How can we as good Christians tolerate the presence of
            the Papist rot? How can we tolerate to live alongside them and not
            make war upon them? Is the apocalypse we see unfolding all around
            us not God's judgment on us, also, that we lack the courage to wage
            war relentlessly against the enemies of God until they are utterly
            destroyed? Have we so easily forgotten the martyrs of our wars of
            religion, or the holy blood that cries out for justice? God judges
            us as cowards in the defense of His Church, and it is a charge we
            cannot deny while a single Papist yet lives.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Dutch written with a cramped and aggressive
            hand.</p>
      slavery:
        title: Sin of Slavery
        note: |
          <p>This note was rolled up inside an old rum bottle that you plucked
            from the sea on {date}. It is written in English with a wild and
            expressive hand. It is a sermon arguing that the Scourge is God's
            punishment for the evils of the slave trade.</p>
          <h3>Excerpt</h3>
          <blockquote><p>They say that Hell has burst forth in the Caribbean,
            and that is undeniably true. One can scarcely watch the Scourge
            rise up out of the depths and believe otherwise. But if Hell has
            indeed burst forth in the Caribbean, is it not merely answering our
            call? For likewise, who could hear the cries rising from the belly
            of a guineaman in the Middle Passage and not likewise hear the
            anguished cries of Hell? Who could bear witness to the cruelties
            visited upon our fellow sons and daughters of Adam, made in God's
            sacred image, on plantations across the West Indies and not
            recognize in that the same Infernal stamp? We made Hell in the
            Caribbean long before it answered our call. The Scourge is
            undeniably God's judgment upon us, aye, and it is a judgment we
            well deserve, for like the Israelites in Egypt, the cries of those
            we keep in bondage rise up to Heaven. Like the Egyptians, God
            smites us now with plagues and demands that we let His people go
            — and like Pharaoh before us, we harden our hearts.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with a wild and expressive
            hand.</p>
      cain:
        title: Sin of Cain
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a careful and
            confident hand. It is a sermon arguing that the Scourge is God's
            punishment for the atrocities committed against the indigenous
            people of the New World.</p>
          <h3>Excerpt</h3>
          <blockquote><p>This New World was never an empty land for us to take
            possession of. Long before any Spaniard, Englishman, or anyone else
            of the Old World set foot here, it already had its own peoples,
            tribes, nations, and kingdoms, each with their own languages,
            customs, beliefs, and laws. It is good and right to preach the
            gospel of Our Lord to these people, of course — for Christ
            commanded us, “Go ye into all the world, and preach the gospel to
            every creature” — but in the name of this sacred commission, many
            terrible sins have also been committed. Heavy bondage has been laid
            upon the innocent who deserve patient instruction, and the scourge
            has been employed where reason should have prevailed. In the name
            of the gospel, greedy men have sought their own profit, and brought
            misery and death almost beyond belief. For when we first came to
            these islands, they teemed with Kalinago and Taino, and behold how
            few of these ancient nations even now remain. In the New World we
            found our brothers, long lost to us, but rather than share with
            them the good news of Our Lord and Savior, we were to them as Cain.
            And now that we bear the mark of Cain, how can we dare to act as if
            surprised when God sends His righteous judgement upon us?</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with a careful and
            confident hand.</p>
    nature:
      gospel:
        title: The Gospel Written in the Lord’s Own Hand
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Dutch with a wild and flowing
            hand. It is a sermon arguing that creation itself is a more
            reliable testament of God's will than scripture.</p>
          <h3>Excerpt</h3>
          <blockquote><p>God has revealed Himself twice to us: first in
            Creation, and then in Scripture. Theologians often dwell upon the
            value of Scripture, for it speaks to us plainly in human words, but
            it is in fact the lesser of the two. Miraculous as the process of
            inspiration may be in how it guided the hands of human authors and
            editors down through the generations, yet the involvement of human
            hands has introduced the possibility of error and misunderstanding.
            Creation is the gospel that the Lord has written in His own hand.
            If we find contradiction between it and Scripture, is that not
            proof that we have misunderstood Scripture? Creation may speak as
            eloquently to us as the most beautiful verses of the Holy Bible, if
            we have eyes to see and ears to hear.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Dutch written with a wild and flowing
            hand.</p>
      lilies:
        title: Lilies of the Field
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in French with a bold and messy
            hand, and contains a sermon on Luke 12:27.</p>
          <h3>Excerpt</h3>
          <blockuqote><p>“Consider the lilies how they grow: they toil not,
            they spin not; and yet I say unto you, that Solomon in all his
            glory was not arrayed like one of these.“ Often we read these
            words, but what would it mean if we truly had faith and took the
            words of Christ to heart? Would you abandon your trade and go to
            live in the wilderness, trusting to God’s creation to provide for
            everything you need? Would you sow not, nor reap? If no, then are
            you truly a Christian? Does Christ not command us here, quite
            plainly, to leave behind our daily toils, to quit our employment,
            to abandon civilization itself and live as Adam did in Eden? To
            take up the life of Eden, even if we are exiled from it? Is this,
            perhaps, the true heart of the Christian faith, which so few
            Christians have had the courage to follow? Is the Kingdom of God
            the world that awaits us when we all walk away from Rome together
            as brothers and sisters and fellow children of Adam, to make a new
            Eden?</p></blockquote>
        additional: |
          <p><strong>Page:</strong> French written with a bold and messy
            hand.</p>
      green:
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a flowing, feminine
            hand. It is a tract dwelling on the significance of the color
            green.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Green is the color of earth, of living things, of
            life, and of rot. We deck our halls with it and dye our linens, but
            should it come creeping up the cobbles, we scrub it out, fast as we
            can. When it blooms beneath our skin, we bleed it out. And when we,
            together all, find that our reach has exceeded our grasp, we cut it
            down, we stamp it out, we spread ourselves atop it and smother it
            beneath our bellies, but it comes back. It does not dally, nor does
            it wait to plot or conspire. Pull it out by the roots one day and
            then next, there it is, creeping in around the edges. Whilst we’re
            off looking for red, in comes green. Red is the color of lust, but
            green is what lust leaves behind — in heart, in womb. Green is what
            is left when ardor fades, when passion dies, when we die, too. When
            you go, your footprints will fill with grass. Moss shall cover your
            tombstone, and as the sun rises, green shall spread over all, in
            all its shades and hues. This verdigris will overtake your swords
            and your coins and your battlements and, try as you might, all you
            hold dear will succumb to it. Your skin, your bones, your
            virtue.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with a flowing, feminine
            hand.</p>
      ribbon:
        title: The Green Ribbon
        note: |
          <p>A printed page that was rolled up inside an old bottle that you
            plucked from the sea on {date}. It is an old Leveller pamphlet,
            printed in English.</p>
          <h3>Excerpt</h3>
          <blockquote><p>When our Savior Christ (who being such an
            extraordinary person, might have warrant to do what would have been
            presumption in any other) was appealed to in a cause that
            appertained to the civil Magistrates decision; he refused to deal
            in it, with these words, “Who made me a Judge, or a divider over
            you?” according to which words of him, who was the truth, he that
            may rule, must be placed in that office by some body, and may not
            undertake it of himself: no man may take this honor to himself, or
            be his own advancer to the Throne; but he must be installed by
            another: and what other creature, besides the Nation itself, can
            challenge a power to appoint over it its Rulers is not to me
            imaginable. Angels are not of this Occonomie, do not intermeddle in
            this business, and for other people, or foreign States they are but
            in an equality, and have no partnership in this matter; they have
            no more to do to impose Governors over their neighbors, then they
            have reciprocally over them; and to whichsoever may attempt it
            towards the other, by the analogy of our Savior’s words, it may be
            said, “Who made thee a Judge, or Rule-maker over me?”</p></blockquote>
        additional: |
          <p><strong>Page:</strong> A printed page in English, tied in a small
            ribbon of green silk.</p>
      eden:
        title: End of Eden
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Spanish with a firm and
            confident hand. It is a sermon arguing that the New World was
            Edenic when Europeans found it, and the Scourge is God's punishment
            for destroying it.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Do you remember how it was, before the dead rose?
            White sand beaches and waters so blue it would break your heart.
            This land was paradise before we broke it open with our sins, for
            what other conclusion can we draw? We came to paradise, and found
            here our brothers and sisters living as Adam did in Eden. We
            enslaved them and beat them, and then brought our African brothers
            and sisters here in chains. Here we saw a glimpse of creation as
            God prepared it for us: a paradise for us all to share, but we came
            not to share, but to conquer, and for that sin the earth itself
            split open and the dead began to rise. And yet, even now, nature
            endures. The sun shines upon the righteous and the wicked alike.
            God's truest scripture was written by His own Divine Hand, in
            Creation itself, and it shows us the way back to Eden even in these
            Last Days, the way to repair the harms we have done and heal this
            wounded creation, if we are finally ready to listen.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Spanish written in a firm and confident
            hand.</p>
      savage:
        title: The Savage is Truly Noble
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with the studied,
            careful hand of a scholar. It is an essay arguing that the
            indigenous peoples of the New World present a model that Europeans
            should follow.</p>
          <h3>Excerpt</h3>
          <blockquote><p>It is said that during the Peasants’ Revolt, there was
            a certain wise man who was inspired by God to preach: “When Adam
            delved and Eve span, who was then the gentleman?” By this he
            reminded us that ranks and titles were invented by Man, not by God,
            for when the children of Israel asked for a king, did God not
            command Samuel to prophesy, “And in that day you will cry out
            because of your king, whom you have chosen for yourselves, but the
            Lord will not answer you in that day”? How can our sovereign now
            claim to rule by divine right, when Scripture itself warns us of
            the perfidy and treachery of kings? For as the playwright John
            Dryden penned: “I am as free as nature first made man / Ere the
            base laws of servitude began / When wild in woods the noble savage
            ran.” If this astonishes, is that not testament to how thoroughly
            we have been deceived? For do we not see the evidence of this in
            the New World, where peoples who have not heard these lies live
            wholesome lives without them? In the Old World, hunting is reserved
            for the aristocracy, but in the New World it is the common right of
            every person. In the Old World, the rich are satiated and the poor
            starve, but in the New World people share and all feast or go
            hungry together. In the Old World, kings claim to rule in the name
            of the Lord, but in the New World every person is free, and will
            suffer not the base indignities of servitude. Is the doctrine,
            then, that God appointed kings to rule over us not here revealed as
            a blasphemous lie? God made each of us free and equal, sons and
            daughters of Adam made in his sacred image. To each of us is
            granted a measure of wisdom to govern our own affairs, and to no
            one the wisdom to govern even one another. To claim otherwise is to
            blaspheme the very image of God.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English written with the studied, careful
            hand of a scholar.</p>
    gods:
      old:
        title: The Old Ways
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in French in a nearly illegible
            scrawl. It implores its readers to forsake Christianity and embrace
            Hellenistic polytheism.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Look upon the works of your Christian god. You sail
            upon Poseidon's waves, and are subject to his rule! You beseech
            Zeus to send the winds, and Hades to tend your immortal soul. Our
            ancestors understood the ways of the gods; it was only with the
            onset of the cross that the great empires of old fell into ruin,
            and now that impious monotheistic superstition has brought us to
            this. Make sacrifice to Poseidon, sailor, before he takes his
            due!</p></blockquote>
        additional: |
          <p><strong>Page:</strong> French in a nearly illegible scrawl.</p>
      neptune:
        title: Offering to Neptune
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}, along with a few pieces of eight. It is written
            in Spanish in a hurried and nervous hand. It is a prayer to the
            ancient pagan god of the sea, Neptune, for a safe voyage.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Neptune, divine Lord of the Trident, on whose high
            seas we begin to cross, if my preparations are made justly, grant
            our ship to sail safely and do not scorn to aid our labors.</p></blockquote>
        additional: |
          <p><strong>Coins:</strong> [[d10]] Spanish pieces of eight, minted
            [[d100+100]] years ago.</p>
          <p><strong>Page:</strong> Spanish in a hurried and nervous hand.</p>
        hint: a few coins
      thor:
        title: Hammer of Thor
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}, along with a {mjolnir} tied around its neck. It
            is written in Danish with an emphatic, aggressive hand. It exhorts
            the reader to make sacrifices to the old heathen god Thor.</p>
          <h3>Excerpt</h3>
          <blockquote><p>The draugr rise from the depths of the briny sea, and
            the Shepherd God is nowhere to be found. His flock is scattered and
            devoured by the wolves of Hel. Who will protect you, Christian, now
            that Heimdal’s horn is blowing and the shadow of Ragnarok falls
            upon us? Make blót to Thor, the Lord of Thunder, who has ever
            protected the children of Midgard from trolls and jötunn! Even now
            as Bifrost breaks, Thor struggles with Jörmungandr in the
            tempest-tossed sea. Join him, warrior, in this last, glorious
            battle! Only by Mjölnir’s might shall the unworthy dead be hammered
            back into the sea!</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Danish in an emphatic and aggressive
            hand.</p>
        description: with a small, silver pendant tied tightly around its neck
        mjolnir: small, silver pendant
      odin:
        title: Odin’s Horse
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a crowded and
            careful hand. It exhorts the reader to read and follow the
            teachings of the Hávamál, an ancient text said to have been written
            by the ancient heathen god Odin.</p>
          <h3>Excerpt</h3>
          <blockquote><p>The Christians tell us that Adam and Eve ate from the
            Tree of Knowledge, and this was so great a sin that Christ had to
            hang from the cross as a sacrifice of himself to himself to set
            things right. It is an absurd fable because it is a mockery of the
            truth: the tale of how Odin hung from Yggdrasil, sacrificing
            himself to himself, to gain wisdom. The Christians say that
            knowledge is sin. Odin sacrifices himself to gain knowledge for us
            all, and offers the wisdom so dearly bought in the Hávamál.
            Christians condemn knowledge and extol ignorance, because in
            ignorance they may rule over you. Odin sacrifices himself to give
            you knowledge, that you may rule  your own life, live a life worthy
            of glory and honor, and find your place among the einherjar in
            Valhalla!</p></blockquote>
        additional: |
          <p><strong>Raven Feather:</strong> The page is rolled around a black
            raven’s feather.</p>
          <p><strong>Page:</strong> English in a crowded and careful hand.</p>
      ezili-dantor:
        title: Mother of Strength
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}, wrapped in red, blue, and black ribbons, with
            {tobacco} inside. It is written in French with a rushed and
            unsteady hand. It is a Vodou prayer.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Ezili Dantor, mother of strength, we call upon you.
            Hear the cries of your children. See how we suffer. Do not turn
            your back on us. Come and set us free. Let your wrath fall upon
            those who torment your children. We know that you hear us, for we
            are your children, and you are our mother. We know that our
            tormentors will not be spared your wrath. Come quickly, Mother, and
            wash this land clean with their blood, so your children can be
            free!</p></blockquote>
        description: tied with red, blue, and black ribbons
        hint: some kind of sediment
        tobacco: tobacco
        additional: |
          <p><strong>Page:</strong> French in a rushed and unsteady hand.</p>
      guabancex:
        title: Prayer to Guabancex
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Spanish with a trembling and
            uncertain hand. It was written by a Taino, imploring one of the
            foremost zemis to intervene on behalf of his people against the
            Spanish.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Great Atabey, Mother of Us All, I have offered this
            prayer many times in the language of my ancestors, but you have not
            heard, so I inscribe it now as the Spaniards do and commend it to
            Yucajú and pray he delivers it to you. Great Mother Atabey, your
            children live in bondage and misery! The Spaniards make us their
            slaves, and press us with hard labor until we perish. Great Mother
            Atabey, we implore you, come and save your children before we are
            utterly destroyed! Now is the time to dance with Coatriquie and
            Guataubá, your arms spiraling! Great Cacique of the Wind, we beg
            you, visit us as Guabancex, and bring with you your fiercest
            juracán! The storm of your wrath will wash this island clean of the
            Spanish invaders, and we will be free. Great Mother of Us All, hear
            our prayer!</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Spanish in a trembling and uncertain
            hand.</p>
    chaos:
      folly:
        title: The Folly of Meaning
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a wild and
            scrawling hand. It is an exhortation to embrace the meaninglessness
            of existence.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Cowards and fools cling to the childish idea that
            anything in this world means anything. There is no order or
            significance to what happens to us. We are buffeted by the tides of
            chaos. It is a tale told by an idiot, full of sound and fury,
            signifying nothing. Embrace the meaninglessness of your existence,
            brother! Live for the moment and the whims that seize you, for all
            else is but pretense and lies! The past is gone and the future will
            never be. We have only this, the incoherent scream of the
            present.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English in a wild and scrawling hand.</p>
      hurricane:
        title: The Hurricane
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It’s covered in writing, written in English in a
            cramped and shaky hand, spiraling from the edges of the page
            towards the center, like a maelstrom pulling you in.</p>
          <p>{handout}</p>
        handout: Reading the Hurricane
      dice:
        title: Sacrament of Dice
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}, along with two small {dice}. It is written in
            French with a scratchy and untrained hand. It is a sermon on the
            holiness of dice as the voice with which chaos speaks.</p>
          <h3>Excerpt</h3>
          <blockquote><p>It was common among the ancients to cast lots to
            divine the will of the gods. Even the high priest in Jerusalem kept
            the Urim and Thummim in the Breastplate of Justice to divine the
            will of Jehovah. Where the ancients perceived Providence, Blaise
            Pascal and Pierre de Fermat glimpsed mathematical laws of chance
            that govern the universe — and after all, is that not the same
            thing? What the philosopher apprehends in numbers, we experience
            with the knuckle bones in our clasped hands or tumbling cups. They
            reveal the lie of our certainty and the pretensions of our ordered
            universe. It is chaos that rules the world, chaos that is the one
            true god, and in the dice he makes his will known to us.</p></blockquote>
        hint: two other objects clanking around
        dice: lead dice
        additional: |
          <p><strong>Page:</strong> French in a scratchy and untrained
            hand.</p>
      ship:
        title: Ship of Fools
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Dutch with a scrawling and
            uneven hand. It is a sermon concerning the ship of fools.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Saint Grobian, pray for us, witless, flatulent,
            drunken, and crude as we are, cast adrift upon the waves of fate in
            this ship of fools. We are all of us fools after all, and none more
            foolish than the ones who call themselves wise. They set themselves
            as the captains of our ship, and vie against one another for
            command, and so many of us are fool enough to follow. Saint
            Grobian, though foolish it may be to beg thee, patron of fools, to
            bless us with a shred of wisdom, yet am I fool enough to ask: help
            them to understand the truth that there is no wise man to find, no
            better ship to imagine on its straight course, naught but each
            other upon this rickety boat and the endless waters of chaos upon
            which we sail. It is a tale told by an idiot, full of sound and
            fury, signifying nothing.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Dutch in a scrawling and uneven hand.</p>
      eustasius:
        title: The Revelation of Sint Eustasius
        note: |
          <p>This note was rolled up inside an old rum bottle that you plucked
            from the sea on {date}. It is written in Dutch with a calm and
            careful hand. It is a chilling, matter-of-fact account of the
            cruelty that the author has witnessed at the slave house and
            warehouses of {eustasius}.</p>
          <h3>Excerpt</h3>
          <blockquote><p>I say that I saw these things, and I did, though in
            truth some of them I did. Fewer of those at the start of my
            account, but more as one progresses, for even when it was my own
            hand that moved, I felt as if one observing another. I can still
            remember that the screams bothered me when I first came here, but
            in time I became accustomed to it. Some of my fellows deal with it
            by convincing themselves that there is some distinction to be made
            between us and them, but that is too obvious a lie for me to
            accept. No, I reconciled myself to this by recognizing that all
            life is empty and meaningless, my own very much included. We are
            but rotting meat, all of us. I was once a Christian, pitiful and
            naïve in my child-like faith in “compassion” and “mercy.” Such
            foolishness! If there were a just god in heaven, every one of us
            here would be taken by the Angel of Death like the firstborn of
            Egypt and cast into the deepest pit of hell. Yet I sleep soundly
            each night on a comfortable bed with soft linens and my masters are
            rewarded with wealth beyond measure, because God was butchered long
            ago and the world is a slaughter bench.</p></blockquote>
        eustasius: Sint Eustasius
        additional: |
          <p><strong>Page:</strong> Dutch in a calm and careful hand.</p>
      primordial:
        title: Primordial Chaos
        note: |
          <p>This page was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is page is torn from a relatively recent
            Spanish printing of <em>Liber Chaos</em>, a book by Ramon Llull, a
            14th century Mallorcan theologian. The page argues that his ternary
            correlatives (agent, patient, and act) must have also existed even
            within the primordial chaos that existed before creation. There is
            a long note scrawled in the margin, also in Spanish.</p>
          <h3>Note</h3>
          <blockquote><p>But the system of correlatives is itself an order, and
            so the primordial chaos would not have been chaos, but just the
            divine order of God — but how can God's order exist before God
            created order? So Llull must be wrong. Chaos must be without agent,
            patient, or act. But if it is even without agent, then how can it
            be at all? I feel my mind being swallowed by a great morass of
            contradiction, beyond space and time and being, an eternal infinite
            of nothingness and contradiction that must even subsume God. Am I
            damned already for such a thought? And yet, how can I unthink
            it?</p></blockquote>
        additional: |
          <p><strong>Page:</strong> A page torn from a printed manuscript, with
            a long note scrawled in the margin. Both the printing and the
            marginalia are written in Spanish.</p>
    deep:
      call:
        title: Call of the Deep
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in English with a shaking and
            uneven hand. It is a haunting note about the call of the deep.</p>
          <h3>Excerpt</h3>
          <blockquote><p>You found me upon the waves, for you hear it, too.
            That's why you were out here, where you could find me, because the
            depths call to you. There is Something in that murky abyss,
            something known only to the creatures who dwell far beyond the
            sun's light and the drowned who go down to join them. Are you also
            torn between that call and the fear of what you might find down
            there — and what it will cost you to follow it? Fear not, brother.
            I go before you, and when you are ready, I will be there to greet
            you.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English in a shaking and uneven hand.</p>
      song:
        title: Song of the Prophets
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in French with a looping and
            ornate hand. It is a sermon claiming that whales are prophets of
            the deep.</p>
          <h3>Excerpt</h3>
          <blockquote><p>To behold these vast beings is to apprehend why our
            ancestors believed in gods. To hear their song is to know that they
            were right. There is a depth to it that you might feel in your
            chest that your human ears, accustomed to the thin air of our
            world, cannot perceive. To live in the deep as they do, would we
            hear the ocean entire echoing with their great song? Or is the deep
            naught but that song, a song as old as the foundations of the
            earth, a song upon which our petty kingdoms of dirt are perched, a
            song from which all life has sprung, and a song to which all life
            must one day return?</p></blockquote>
        additional: |
          <p><strong>Page:</strong> French in a looping and ornate hand.</p>
      baptism:
        title: True Baptism
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Spanish with a wild and
            scratching hand. It is a sermon on the sanctity of drowning.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Do you think a few drops of water on a newborn babe’s
            forehead is truly enough to save its soul? The Baptist submerged
            Jesus fully in the River Jordan, and I tell you even that was
            insufficient — a pale mockery of the true baptism. The Jordan seeks
            the sea as all rivers do, but never finds it, and the Mediterranean
            itself is but a pond of the great, wide Ocean. Only within its
            unfathomable depths can you return to the womb that birthed all
            life. Let its brine burn your lungs and submit to the endless dark
            that envelopes you. Only then will you have the true baptism. That
            which is dead can never die.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Spanish in a wild and scratching hand.</p>
      sirens:
        title: Sirens’ Song
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Dutch with a wild and
            undisciplined hand. It is an exhortation to seek out and give
            yourself over to sirens.</p>
          <h3>Excerpt</h3>
          <blockquote><p>Homer tells us that when his ship passed by the
            sirens, Odysseus, “of many devices,” stuffed the ears of his
            sailors with beeswax, but he himself wished to hear their song, and
            so had himself lashed to the mast. Ah, but how he regretted that
            decision once he heard their song and could not swim out to them!
            Homer considers this a wise act of forethought because it spared
            Odysseus his life, but in that moment the son of Laertes learned
            that there are things more precious than life. No doubt the man of
            many sorrows wished that he could have traded his glorious return
            and all the years he spent reigning in peace as king of Ithaca for
            a chance to go back to that moment and swim out to the sirens. For
            it is only those who cling too strongly to this fleeting mortal
            life who would call it a trick to lure you to your doom. To hear
            that song is to know the truth, that there is no sweeter fate than
            to surrender yourself entirely to the daughters of Achelous — to
            surrender yourself to the briny depths of the sea. Learn from the
            folly of Odysseus, sailor, and be wiser than the man who thought
            himself wise. If you are blessed to hear the sirens’ song, answer
            it with a joyful heart. And if you are truly wise, seek them
            out.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Dutch in a wild and undisciplined hand.</p>
      bones:
        title: City of Bones
        note: |
          <p>This note was rolled up inside an old rum bottle that you plucked
            from the sea on {date}. It is written in English with a confident
            but unpracticed hand. It was written by a slave named Esther about
            a place called “the City of Bones,” found in the middle of the
            Atlantic, at the bottom of the ocean, where those who chose to
            drown rather than face a life in bondage found a new home.</p>
          <h3>Excerpt</h3>
          <blockquote><p>It’s only a half mile by a half mile but that’s a
            city. It’s made of bones. Pearly white bones. All the buildings and
            everything is made of bones. I seen it. I been there. My mother
            live there. I got an aunt and three uncles live down there in that
            city made of bones. That’s the center of the world. In time it will
            all come to light. The people made a kingdom out of nothing. They
            were the people that didn’t make it across the water. They sat down
            right there. They say, “Let’s make a kingdom. Let’s make a city of 
            ones.” The people got a burning tongue. Their mouths are on fire
            with song. That water can’t put it out. That song is powerful. It
            rise up and come across the water. Ten thousand tongues and ten
            thousand chariots coming across the water. They on their way. They
            coming across the water. Ten thousand hands and feet coming across
            the water. They on their way.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> English in a confident but unpracticed
            hand.</p>
      nautilus:
        title: Nautilus
        note: |
          <p>This note was rolled up inside an old bottle that you plucked from
            the sea on {date}. It is written in Spanish with a cramped and
            undisciplined hand. It is a sermon on the mysteries of the
            nautilus.</p>
          <h3>Excerpt</h3>
          <blockquote><p>The ancients studied the mysteries of the divine ratio
            and built it into their greatest feats of architecture, yet we see
            the same jewel in the shell of a lowly nautilus. This spiral of
            natural perfection pulls us into itself, the genius of the
            thalassic depths etched even upon its Neptunian shores. We walk
            about the earth, holding this salted water within our flash, a wave
            that thought to walk about inland for a time, but trapped in this
            form we are cut off from the pelagic intelligence from which our
            own meager reason is borrowed. In the spiraling shape of the
            nautilus we see a map to take us back to the primordial waters in
            which we have our source, for as every river runs eventually to the
            ocean, so too does every life, and when our dry sojourn is done, we
            shall rejoin the endless tidal mind from which this life was
            briefly borrowed, and know again the true wisdom of the
            ages.</p></blockquote>
        additional: |
          <p><strong>Page:</strong> Spanish in a cramped and undisciplined
            hand.</p>