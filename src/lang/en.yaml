  log:
    title: Adventure Log
    first: |
      Winter solstice. Two years ago today the world ended. The Abyss opened
      and the Scourge fell upon us. It is no longer sugar or spice that drives
      the world mad, but ash — and the Caribbean is the only place where it can
      be found. For now, at least. How long will it be before the Scourge
      spreads to burn the whole world to ash?
    command:
      description: |
        Add an entry to the adventure log.
      autocomplete:
        alias: "{alias} Entry text"
        description: |
          Add an entry to the adventure log.
      response:
        speaker: Adventure Log
        content: |
          The @UUID[{uuid}] has been updated.
    events:
      outbreak: |
        {disease} grips {location}. {reaction}
      uprising:
        sea: |
          Prisoners aboard the {ship} seize control of the ship, forcing
          the crew to take them to {island}. {response}
        port: |
          While being taken ashore, the prisoners aboard the {ship} break free
          and fight their way to freedom in the wilderness of {island}.
          {response}
        plantation: |
          Slaves on a sugar plantation in {island} rise up and claim their
          freedom. {response}
        maroons: |
          A maroon community in {island} mounts a raid on a sugar plantation,
          freeing those held in bondage there. {response}
        rebellion: |
          On several sugar plantations across {island}, the slaves rise up on
          the same night in a coordinated rebellion. {response}
        responses:
          patrols: |
            The governor orders increased patrols around all plantations and
            in the vicinity of all known maroon settlements.
          lockdown: |
            The governor orders a lockdown of plantations across the island,
            forbidding the movement of slaves and requiring them to be confined
            and carefully watched by armed overseers.
          bounties: |
            The governor offers a reward for the capture of all escaped slaves,
            and larger rewards for the ringleaders.
          threshold: |
            As the latest of several such disruptions, the governor responds by
            raising the militia and ordering {x} soldiers from the garrison to
            crush the insurrection.
          emergency: |
            The governor calls up the militia and orders {x} soldiers from the
            garrison to crush the rebellion.
